; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; ========== Library Dependencies ==========
; MPU9250 - I2C (using built-in Wire.h)
; BMP085/BMP180 - I2C barometric pressure sensor
lib_deps =
    adafruit/Adafruit BMP085 Library@1.2.4
    mikalhart/TinyGPSPlus@1.1.0
    ; SD library - included in Teensy core but listed for explicit dependency
    ; The SD library is part of Arduino core, for Teensy it's included automatically

; Build flags for optimized performance
build_flags =
    -Wall
    -Wextra
    -O2

; Serial monitor settings
monitor_speed = 115200
